name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so the latest push is what gates merge.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch keeps the runner slim (no CUDA wheels)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run test suite
        # `network` tests download models from the HF hub; deselected here to
        # keep CI hermetic and fast. Everything else — including the torch
        # mechanism tests on locally-built models — runs offline.
        run: pytest -m "not network" -q
